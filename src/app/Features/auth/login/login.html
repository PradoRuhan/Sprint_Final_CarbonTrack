<section class="auth-section d-flex align-items-center justify-content-center">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- caule central -->
        <path d="M12 22V10" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <!-- galho esquerdo -->
        <path d="M12 14L7 10" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <!-- galho direito -->
        <path d="M12 14L17 10" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <!-- galho central -->
        <path d="M12 10V6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <!-- folha galho esquerdo -->
        <ellipse cx="6" cy="8.5" rx="2.4" ry="1.4" transform="rotate(-35 6 8.5)" fill="white"/>
        <!-- folha galho central -->
        <ellipse cx="12" cy="4.5" rx="2.4" ry="1.4" fill="white"/>
        <!-- folha galho direito -->
        <ellipse cx="18" cy="8.5" rx="2.4" ry="1.4" transform="rotate(35 18 8.5)" fill="white"/>
      </svg>
    </div>
      <h3 class="fw-bold text-white">Bem-vindo de volta</h3>
      <p class="text-white-50 mb-0">Acesse sua conta para gerenciar seus projetos de carbono.</p>
    </div>

    <div class="alert alert-danger py-2 small" *ngIf="errorMessage()">
      <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ errorMessage() }}
    </div>

    <div class="demo-selector mb-4">
        <p class="demo-label">Entrar como:</p>
        <div class="demo-toggle">
          <button
            type="button"
            class="demo-btn"
            [class.active]="selectedDemo() === 'producer'"
            (click)="fillDemo('producer')"
          >
            <i class="bi bi-person-fill"></i> Produtor Associado
          </button>
          <button
            type="button"
            class="demo-btn"
            [class.active]="selectedDemo() === 'admin'"
            (click)="fillDemo('admin')"
          >
            <i class="bi bi-shield-lock-fill"></i> Administrador
          </button>
        </div>
      </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="form-label small text-white-50 text-uppercase fw-bold">Email</label>
      <div class="input-icon-group mb-3">
        <i class="bi bi-envelope-fill"></i>
        <input
          type="email"
          class="form-control glass-input"
          formControlName="email"
          [class.is-invalid]="email.invalid && email.touched"
          placeholder="seu@email.com"
        />
      </div>

      <label class="form-label small text-white-50 text-uppercase fw-bold">Senha</label>
      <div class="input-icon-group mb-2">
        <i class="bi bi-lock-fill"></i>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          class="form-control glass-input"
          formControlName="password"
          [class.is-invalid]="password.invalid && password.touched"
          placeholder="••••••••"
        />
        <i
          class="bi toggle-eye"
          [class.bi-eye-fill]="!showPassword()"
          [class.bi-eye-slash-fill]="showPassword()"
          (click)="togglePassword()"
        ></i>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe" formControlName="rememberMe" />
          <label class="form-check-label small text-white-50" for="rememberMe">Mantenha-me conectado</label>
        </div>
        <a href="javascript:void(0)" class="small text-success-emphasis">Esqueci minha senha</a>
      </div>

      <div class="form-check mb-4">
        <input type="checkbox" class="form-check-input" id="acceptedTermsLogin" formControlName="acceptedTerms" />
        <label class="form-check-label small text-white-50" for="acceptedTermsLogin">
          Li e concordo com os Termos e a Política de Privacidade (LGPD).
        </label>
      </div>

      <button type="submit" class="btn btn-light w-100 rounded-pill py-2 fw-bold" [disabled]="loading()">
        <span *ngIf="loading()" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading() ? 'Entrando...' : 'Entrar' }} <i class="bi bi-arrow-right ms-1" *ngIf="!loading()"></i>
      </button>
    </form>

    <p class="text-center mt-4 mb-0 small text-white-50">
      Não tem conta?
      <a routerLink="/register" class="text-white fw-bold text-decoration-none">Criar conta</a>
    </p>
  </div>
</section>
