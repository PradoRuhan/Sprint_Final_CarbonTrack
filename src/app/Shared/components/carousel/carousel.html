<div id="heroCarousel" class="carousel slide" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">  <div class="carousel-inner">
    <div class="carousel-item" *ngFor="let slide of slides; let i = index" [class.active]="i === 0">
      <div class="container">
        <div class="text-center mb-4">
          <span class="section-badge">🌱 {{ slide.badge }}</span>
          <h2 class="fw-bold display-6 mt-3 mb-2">{{ slide.title }}</h2>
          <p class="text-secondary mb-0 mx-auto" style="max-width: 640px;">{{ slide.description }}</p>
        </div>

        <div class="row g-4 align-items-center" [class.flex-row-reverse]="slide.imagePosition === 'right'">
          <div class="col-lg-5">
            <div class="slide-image-wrap">
              <img [src]="slide.imageUrl" [alt]="slide.title" class="slide-image" />
              <div class="live-overlay-badge" *ngIf="slide.liveBadge">
                <span class="live-dot"></span> {{ slide.liveBadge }}
              </div>
            </div>
          </div>

          <div class="col-lg-7">
            <!-- Cards -->
            <div class="row g-3" *ngIf="slide.contentType === 'cards'">
              <div class="col-sm-6" *ngFor="let card of slide.cards">
                <div class="info-card">
                  <div class="info-card-icon"><i class="bi" [ngClass]="card.icon"></i></div>
                  <h6 class="fw-bold mb-1">{{ card.title }}</h6>
                  <p class="text-secondary small mb-0">{{ card.description }}</p>
                </div>
              </div>
            </div>

            <!-- Checklist -->
            <ul class="checklist" *ngIf="slide.contentType === 'checklist'">
              <li *ngFor="let item of slide.checklist">
                <i class="bi bi-check-circle-fill"></i> {{ item }}
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

<button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span class="control-btn"><i class="bi bi-chevron-left"></i></span>
    <span class="visually-hidden">Anterior</span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
    <span class="control-btn"><i class="bi bi-chevron-right"></i></span>
    <span class="visually-hidden">Próximo</span>
  </button>

  <div class="carousel-indicators-bottom">
    <button
      *ngFor="let slide of slides; let i = index"
      type="button"
      data-bs-target="#heroCarousel"
      [attr.data-bs-slide-to]="i"
      [class.active]="i === 0"
    ></button>
  </div>
</div>
